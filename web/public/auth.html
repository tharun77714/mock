<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MockMate – Sign In</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * {margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#111;color:#fff;overflow:hidden;}
  body::before{content:"";position:fixed;inset:0;background:url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIiIGhlaWdodD0iMTIiIHZpZXdCb3g9IjAgMCAxMiAxMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZmlsdGVyIGlkPSJmaW5kIj48ZmVUdWx0aW5lIGluPSJzb3VyY2UiIHJlc3VsdD0iZmxhdHRlciI+PGZlRmxhdHRlciBpbj0iU3R5bGUiIHN0eWxlPSJvcGFjaXR5OjAuMDU7Ii8+PC9mZVR1bHRpbmU+PC9maWx0ZXI+PC9zdmc+');opacity:0.07;pointer-events:none;z-index:1;}
  .container{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%;}
  .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:12px;backdrop-filter:blur(12px);padding:2rem 1.5rem;max-width:360px;width:90%;text-align:center;box-shadow:0 0 30px rgba(0,0,0,0.6);animation:fadeIn .6s ease-out forwards;}
  .card h1{font-family:"Playfair Display",serif;font-size:2rem;margin-bottom:.5rem;}
  .card p{font-size:.9rem;opacity:.8;margin-bottom:1.5rem;}
  .btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.75rem 1rem;margin:.5rem 0;border:none;border-radius:8px;font-size:.95rem;cursor:pointer;transition:transform .2s,box-shadow .2s;background:#fff;color:#111;}
  .btn.github{background:#24292e;color:#fff;}
  .btn.google{background:#fff;color:#111;border:1px solid #ddd;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3);}
  .divider{display:flex;align-items:center;margin:1rem 0;color:#aaa;font-size:.85rem;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:#444;margin:0 .5rem;}
  .email-input{display:flex;gap:.5rem;margin-top:.5rem;}
  .email-input input{flex:1;padding:.6rem;border-radius:6px;border:1px solid #444;background:#222;color:#fff;}
  .email-input button{padding:.6rem 1rem;border-radius:6px;border:none;background:#4a90e2;color:#fff;cursor:pointer;transition:background .2s;}
  .email-input button:hover{background:#357ab8;}
  .footer{font-size:.75rem;opacity:.6;margin-top:1.5rem;}
  .spinner{border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;width:16px;height:16px;animation:spin .8s linear infinite;margin-left:.5rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="container">
  <div class="card" id="loginCard">
    <h1>MockMate</h1>
    <p>AI‑Powered Mock Interviews</p>
    <button class="btn github" id="githubBtn">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.68 7.68 0 012 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Continue with GitHub
    </button>
    <button class="btn google" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 533.5 544.3" aria-hidden="true"><path fill="#4285F4" d="M533.5 278.4c0-17.5-1.6-34.5-4.6-50.9H272v96.3h146.9c-6.4 34.5-25.5 63.8-54.3 83.4v68.9h87.8c51.5-47.5 81.1-117.5 81.1-197.7"/><path fill="#34A853" d="M272 544.3c73.2 0 134.7-24.2 179.6-65.7l-87.8-68.9c-24.4 16.4-55.5 26-91.8 26-70.5 0-130.3-47.5-151.7-111.3H31.9v70.1c44.8 88.5 136.5 149.8 240.1 149.8"/><path fill="#FBBC05" d="M120.3 324.4c-10.5-31.5-10.5-65.6 0-97.1V157.2H31.9c-41.2 81.5-41.2 176.9 0 258.4l88.4-71.2"/><path fill="#EA4335" d="M272 107.7c39.7-.6 77.8 13.9 107.1 40.5l80.1-80.1C416.5 23.4 345.9-1.9 272 0 168.4 0 76.7 61.3 31.9 149.8l88.4 71.1c21.4-63.8 81.2-111.2 151.7-111.2"/></svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <div class="email-input">
      <input type="email" placeholder="Email address" id="emailField" />
      <button id="emailBtn">Continue</button>
    </div>
    <div class="footer">By continuing, you agree to our <a href="#" style="color:#4a90e2;">Terms</a> and <a href="#" style="color:#4a90e2;">Privacy Policy</a>.</div>
  </div>
</div>
<script>
function setLoading(btn, loading){
  if(loading){btn.disabled=true;const s=document.createElement('span');s.className='spinner';btn.appendChild(s);}else{btn.disabled=false;const s=btn.querySelector('.spinner');if(s)btn.removeChild(s);}
}
// Real OAuth redirects
document.getElementById('githubBtn').addEventListener('click',()=>{setLoading(document.getElementById('githubBtn'),true);window.location.href='/api/auth/signin/github';});
document.getElementById('googleBtn').addEventListener('click',()=>{setLoading(document.getElementById('googleBtn'),true);window.location.href='/api/auth/signin/google';});
// Email placeholder remains
document.getElementById('emailBtn').addEventListener('click',()=>{const e=document.getElementById('emailField').value;if(!e){alert('Enter email');return;}setLoading(document.getElementById('emailBtn'),true);setTimeout(()=>{setLoading(document.getElementById('emailBtn'),false);alert('Email login not wired');},1500);});
</script>
</body>
</html>
